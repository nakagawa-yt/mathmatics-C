<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ベクトル・ピクニック！一直線のひみつ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        :root {
            --bg-cream: #fff9e6;
            --mint-green: #a7ffeb;
            --cookie-brown: #8d6e63;
            --soft-red: #ff8a80;
            --sky-blue: #b3e5fc;
            --accent-orange: #ffb74d;
            --text-main: #4e342e;
        }
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Comic Sans MS', sans-serif;
            background: linear-gradient(135deg, #ffe0b2 0%, #ffcc80 100%);
            margin: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; color: var(--text-main);
        }
        .app-container {
            background: var(--bg-cream); width: 95vw; max-width: 900px; height: 95vh; max-height: 720px;
            padding: 25px; border-radius: 30px; border: 6px solid var(--cookie-brown);
            display: flex; flex-direction: column; box-sizing: border-box;
            position: relative; box-shadow: 0 15px 0 rgba(141,110,99,0.3);
        }
        .step-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .step-node { width: 40px; height: 12px; background: #d7ccc8; border-radius: 10px; transition: 0.3s; }
        .step-node.active { background: var(--accent-orange); width: 60px; box-shadow: 0 0 10px var(--accent-orange); }
        .step-node.done { background: #81c784; }

        .chat-box {
            background: white; border: 4px dashed var(--accent-orange); border-radius: 20px;
            padding: 15px 25px; margin-bottom: 15px; min-height: 95px;
            position: relative; font-size: 1.1rem; line-height: 1.8; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .main-content { display: flex; flex: 1; gap: 20px; min-height: 0; }
        
        #stage {
            flex: 1.2; position: relative; background: #f1f8e9;
            border: 4px solid var(--cookie-brown); border-radius: 25px; overflow: hidden;
        }
        canvas { position: absolute; width: 100%; height: 100%; }

        .control-panel { flex: 1; display: flex; flex-direction: column; gap: 12px; justify-content: center; }
        
        /* 穴埋め分数レイアウト */
        .formula-container {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-size: 1.4rem; font-weight: bold; background: white; padding: 20px; border-radius: 20px;
            border: 3px solid #bcaaa4; box-shadow: 0 4px 0 rgba(0,0,0,0.05);
        }
        .fraction { display: inline-flex; flex-direction: column; align-items: center; gap: 6px; }
        .numerator { border-bottom: 3px solid var(--cookie-brown); padding-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .denominator { padding-top: 4px; }
        
        .num-input {
            width: 55px; font-size: 1.6rem; text-align: center; border: 3px solid var(--cookie-brown);
            border-radius: 10px; background: #fff; color: var(--text-main); font-weight: bold;
            padding: 4px; transition: 0.2s;
        }
        .num-input:focus { outline: none; border-color: var(--soft-red); background: #fff8f8; }

        /* 5択ボタン */
        .choice-list { display: flex; flex-direction: column; gap: 8px; }
        .choice-btn {
            background: white; border: 3px solid var(--cookie-brown); padding: 10px 14px;
            border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.15rem;
            transition: all 0.2s; color: var(--text-main); box-shadow: 0 3px 0 var(--cookie-brown);
            display: flex; justify-content: center; align-items: center; min-height: 46px;
        }
        .choice-btn.selected { background: var(--accent-orange); transform: translateY(2px); box-shadow: 0 1px 0 var(--cookie-brown); }

        .btn-submit {
            background: var(--soft-red); color: white; padding: 14px; border: none;
            border-radius: 20px; font-size: 1.3rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 0 #d32f2f; margin-top: auto; transition: 0.1s;
        }
        .btn-submit:active { transform: translateY(4px); box-shadow: 0 1px 0 #d32f2f; }
        .btn-submit:disabled { background: #ccc; box-shadow: none; cursor: default; transform: none; }

        #feedback { font-size: 1.3rem; text-align: center; height: 1.3em; font-weight: bold; }

        #clear-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 249, 230, 0.98); z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 22px; padding: 20px; box-sizing: border-box;
        }
        .form-container { width: 100%; flex: 1; background: white; border-radius: 15px; border: 4px solid var(--cookie-brown); overflow: hidden; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="step-bar" id="step-bar">
        <div class="step-node active"></div><div class="step-node"></div><div class="step-node"></div><div class="step-node"></div><div class="step-node"></div>
    </div>

    <div class="chat-box" id="msg"></div>

    <div class="main-content">
        <div id="stage"><canvas id="canvas"></canvas></div>

        <div class="control-panel">
            <div id="input-area"></div>
            <div id="feedback"></div>
            <button class="btn-submit" id="submit-btn" onclick="onCheck()">これで決定！</button>
        </div>
    </div>

    <div id="clear-screen">
        <h2 style="margin: 0 0 10px 0; color: var(--cookie-brown);">🎉 ピクニック大成功！大発見だ！ 🎉</h2>
        <div class="form-container">
            <iframe src="https://forms.gle/fkmx6yzCuFuQeqwVA" width="100%" height="100%" frameborder="0">読み込んでいます…</iframe>
        </div>
        <button class="btn-submit" style="width:240px; margin-top:15px;" onclick="location.reload()">もう一度！</button>
    </div>
</div>

<script>
    let quest = 1, selected = null, isProcessing = false;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const questData = {
        1: {
            title: "Q1: 内分点Pの位置ベクトル",
            text: "🦙「点Pは、辺BCを <strong>3 : 2</strong> に内分する位置にあるね。<br>始点をAとしたとき、点Pの位置ベクトル $\\vec{AP}$ の公式を完成させよう！」",
            type: "vector-in",
            ans: [2, 3, 5] 
        },
        2: {
            title: "Q2: 一直線のベクトル比（内分）",
            text: "🐰「さっきの図を見てみて！点Bから点Pへのベクトル $\\vec{BP}$ は、全体のベクトル $\\vec{BC}$ の<br>何倍かな？図のピョンピョンをヒントに考えてね！」",
            type: "fraction-in",
            ans: [3, 5] 
        },
        3: {
            title: "Q3: 外分点Qの位置ベクトル",
            text: "🦙「今度はちょっと遠くの島まで大ジャンプ！点Qは、辺BCを <strong>3 : 1</strong> に外分するよ。<br>位置ベクトル $\\vec{AQ}$ を完成させてね！（公式のマイナス符号に気をつけよう）」",
            type: "vector-in",
            ans: [-1, 3, 2] 
        },
        4: {
            title: "Q4: 一直線のベクトル比（外分）",
            text: "🦊「外分点Qの図をチェックだ！点Bから点Qへのベクトル $\\vec{BQ}$ は、$\\vec{BC}$ の何倍かな？<br>BからQまでの長さと、BからCまでの長さの比を数えてみよう！」",
            type: "fraction-in",
            ans: [3, 2] 
        },
        5: {
            title: "Q5: 総まとめ！一直線上にある条件",
            text: "🦙「いよいよ最後の問題だよ！異なる3つの点A, B, Pが <strong>一直線上にある</strong> といき、成り立つ関係式を次の5つから選んでね！」",
            type: "choice",
            choices: [
                "\\vec{AB} = 3\\vec{AD}", 
                "\\vec{OP} = 3\\vec{OB}", 
                "\\vec{AP} = 3\\vec{AB}", 
                "\\vec{BP} = 3\\vec{PB}",
                "\\vec{OA} = 3\\vec{OP}"
            ],
            ans: 2 // 2番目が正解
        }
    };

    function init() {
        renderQuest();
    }

    function renderQuest() {
        isProcessing = false;
        selected = null;
        document.getElementById('submit-btn').disabled = false;
        
        const q = questData[quest];
        document.getElementById('msg').innerHTML = `<strong>${q.title}</strong><br>${q.text}`;
        renderMathInElement(document.getElementById('msg'), {delimiters:[{left:"$",right:"$",display:false}]});

        const area = document.getElementById('input-area');
        area.innerHTML = "";

        const stage = document.getElementById('stage');
        const container = document.querySelector('.app-container');
        if (quest === 5) {
            stage.style.display = 'none';
            container.style.maxWidth = '600px';
        } else {
            stage.style.display = 'block';
            container.style.maxWidth = '900px';
            const rect = stage.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        if (q.type === "vector-in") {
            area.innerHTML = `
                <div class="formula-container">
                    <div id="math-left"></div>
                    <div class="fraction">
                        <div class="numerator">
                            <input type="number" id="vec-b" class="num-input">
                            <div id="math-mid1" style="display:inline-block; margin:0 4px;"></div>
                            <input type="number" id="vec-c" class="num-input">
                            <div id="math-mid2" style="display:inline-block; margin:0 4px;"></div>
                        </div>
                        <div class="denominator">
                            <input type="number" id="vec-denom" class="num-input">
                        </div>
                    </div>
                </div>
            `;
            katex.render(quest === 1 ? "\\vec{AP} =" : "\\vec{AQ} =", document.getElementById('math-left'));
            katex.render("\\vec{AB} +", document.getElementById('math-mid1'));
            katex.render("\\vec{AC}", document.getElementById('math-mid2'));

        } else if (q.type === "fraction-in") {
            area.innerHTML = `
                <div class="formula-container">
                    <div id="math-left"></div>
                    <div class="fraction">
                        <div class="numerator">
                            <input type="number" id="frac-num" class="num-input">
                        </div>
                        <div class="denominator">
                            <input type="number" id="frac-denom" class="num-input">
                        </div>
                    </div>
                    <div id="math-right" style="display:inline-block; margin-left:6px;"></div>
                </div>
            `;
            katex.render(quest === 2 ? "\\vec{BP} =" : "\\vec{BQ} =", document.getElementById('math-left'));
            katex.render("\\vec{BC}", document.getElementById('math-right'));

        } else if (q.type === "choice") {
            const list = document.createElement('div');
            list.className = "choice-list";
            q.choices.forEach((formula, i) => {
                const btn = document.createElement('button'); btn.className = "choice-btn";
                const mathSpan = document.createElement('span');
                btn.appendChild(mathSpan);
                list.appendChild(btn);
                
                katex.render(formula, mathSpan); 
                
                btn.onclick = () => { 
                    document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected')); 
                    btn.classList.add('selected'); 
                    selected = i; 
                };
            });
            area.appendChild(list);
        }

        if (quest <= 4) {
            draw();
        }
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        
        const W = canvas.width, H = canvas.height;
        const topMargin = 60;
        const bottomMargin = 100;
        const sideMargin = 60;
        
        const W_active = W - 2 * sideMargin;
        const H_active = H - topMargin - bottomMargin;

        let A, B, C;

        if (quest <= 2) {
            A = { x: W / 2, y: topMargin + 10 };
            B = { x: sideMargin, y: H - bottomMargin };
            C = { x: W - sideMargin, y: H - bottomMargin };
        } else {
            const BC_dist = W_active * 2 / 3;
            A = { x: sideMargin + BC_dist / 2, y: topMargin + 10 };
            B = { x: sideMargin, y: H - bottomMargin };
            C = { x: sideMargin + BC_dist, y: H - bottomMargin };
        }
        
        const P = { x: B.x + (C.x - B.x) * 0.6, y: B.y }; 
        const Q = { x: B.x + (C.x - B.x) * 1.5, y: B.y }; 

        ctx.fillStyle = "rgba(141, 110, 99, 0.08)";
        ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.lineTo(C.x, C.y); ctx.closePath(); ctx.fill();

        ctx.strokeStyle = "#bcaaa4"; ctx.lineWidth = 3.5;
        ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.lineTo(C.x, C.y); ctx.closePath(); ctx.stroke();

        ctx.fillStyle = "#4e342e"; ctx.font = "bold 20px sans-serif";
        ctx.fillText("A 🦙", A.x - 15, A.y - 18);

        ctx.font = "bold 18px sans-serif";

        if (quest <= 2) {
            ctx.fillText("B 🐰", B.x - 45, B.y + 5);
            ctx.fillText("C 🦊", C.x + 15, C.y + 5);
            
            ctx.fillStyle = "#ff5722"; ctx.beginPath(); ctx.arc(P.x, P.y, 6, 0, Math.PI*2); ctx.fill();
            ctx.font = "bold 22px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText("📍", P.x, P.y - 2); 
            ctx.fillStyle = "#4e342e"; ctx.font = "bold 18px sans-serif";
            ctx.fillText("P", P.x, P.y + 25);
            ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";

            drawJumpArc(B, P, "3", "#4caf50", -0.2);
            drawJumpArc(P, C, "2", "#4caf50", -0.2);

            if (quest === 1) {
                drawArrow(A.x, A.y, P.x - A.x, P.y - A.y, "#ff5252", 5, "");
            } else {
                drawArrow(B.x, B.y + 35, P.x - B.x, 0, "#ff5252", 6, "");
                drawArrow(B.x, B.y + 55, C.x - B.x, 0, "#2196f3", 3, "");
            }
        } 
        else {
            ctx.fillText("B 🐰", B.x - 45, B.y + 5);
            ctx.fillText("C 🦊", C.x + 15, C.y + 5);
            
            ctx.strokeStyle = "#bcaaa4"; ctx.lineWidth = 2.5; ctx.setLineDash([8, 4]);
            ctx.beginPath(); 
            ctx.moveTo(C.x + 40, C.y); 
            ctx.lineTo(Q.x - 20, Q.y); 
            ctx.stroke(); 
            ctx.setLineDash([]);

            ctx.fillStyle = "#e91e63"; ctx.beginPath(); ctx.arc(Q.x, Q.y, 6, 0, Math.PI*2); ctx.fill();
            ctx.font = "bold 22px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText("📍", Q.x, Q.y - 2);
            ctx.fillStyle = "#4e342e"; ctx.font = "bold 18px sans-serif";
            ctx.fillText("Q", Q.x, Q.y + 25);
            ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";

            if (quest === 3 || quest === 4) {
                drawJumpArc(B, Q, "3", "#e91e63", -0.25);
                drawJumpArc(C, Q, "1", "#f06292", -0.15); 

                if (quest === 3) {
                    drawArrow(A.x, A.y, Q.x - A.x, Q.y - A.y, "#ff5252", 5, "");
                } else {
                    drawArrow(B.x, B.y + 35, Q.x - B.x, 0, "#ff5252", 6, "");
                    drawArrow(B.x, B.y + 55, C.x - B.x, 0, "#2196f3", 3, "");
                }
            }
        }
    }

    function drawJumpArc(p1, p2, label, color, curveFactor) {
        ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.setLineDash([5, 3]);
        ctx.beginPath();
        const mx = (p1.x + p2.x) / 2;
        const curveOffset = Math.abs(p1.x - p2.x) < 50 ? 20 : Math.abs(p1.x - p2.x) * 0.2;
        const my = (p1.y + p2.y) / 2 + curveFactor * curveOffset;
        ctx.moveTo(p1.x, p1.y); ctx.quadraticCurveTo(mx, my, p2.x, p2.y); ctx.stroke(); ctx.setLineDash([]);
        
        const badgeY = my + (curveFactor > 0 ? 12 : -12);
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(mx, badgeY, 15, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = color; ctx.stroke();
        ctx.fillStyle = color; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(label, mx, badgeY);
        ctx.textAlign = "left"; ctx.textBaseline = "alphabetic"; 
    }

    function drawArrow(x, y, dx, dy, color, width, label) {
        ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = width;
        ctx.moveTo(x, y); ctx.lineTo(x + dx, y + dy); ctx.stroke();
        const a = Math.atan2(dy, dx); ctx.fillStyle = color;
        ctx.beginPath(); ctx.moveTo(x+dx, y+dy);
        ctx.lineTo(x+dx-16*Math.cos(a-0.45), y+dy-16*Math.sin(a-0.45));
        ctx.lineTo(x+dx-16*Math.cos(a+0.45), y+dy-16*Math.sin(a+0.45)); ctx.fill();
        if(label) { 
            ctx.fillStyle = color;
            ctx.font = "italic bold 18px sans-serif"; ctx.fillText(label, x+dx+10, y+dy+5); 
        }
    }

    function onCheck() {
        if (isProcessing) return;
        const q = questData[quest];
        let correct = false;
        
        if (q.type === "vector-in") {
            const b = parseInt(document.getElementById('vec-b').value);
            const c = parseInt(document.getElementById('vec-c').value);
            const denom = parseInt(document.getElementById('vec-denom').value);
            if (isNaN(b) || isNaN(c) || isNaN(denom)) { alert("空欄をうめてね！"); return; }
            correct = (b === q.ans[0] && c === q.ans[1] && denom === q.ans[2]);
        } else if (q.type === "fraction-in") {
            const num = parseInt(document.getElementById('frac-num').value);
            const denom = parseInt(document.getElementById('frac-denom').value);
            if (isNaN(num) || isNaN(denom)) { alert("空欄をうめてね！"); return; }
            correct = (num === q.ans[0] && denom === q.ans[1]);
        } else if (q.type === "choice") {
            if (selected === null) { alert("どれか1つ選んでね！"); return; }
            correct = selected === q.ans;
        }

        const fb = document.getElementById('feedback');
        if (correct) {
            isProcessing = true;
            document.getElementById('submit-btn').disabled = true;
            fb.innerHTML = "✨ ぴんぽーん！大正解！ ✨"; fb.style.color = "#4caf50";
            setTimeout(() => {
                fb.innerHTML = "";
                nextQuest();
            }, 1200);
        } else {
            fb.innerHTML = "おっと、もう一回確認してみよう！"; fb.style.color = "#ff5252";
        }
    }

    function nextQuest() {
        if (quest < 5) {
            document.querySelectorAll('.step-node')[quest-1].className = "step-node done";
            quest++;
            document.querySelectorAll('.step-node')[quest-1].className = "step-node active";
            renderQuest();
        } else {
            document.getElementById('clear-screen').style.display = 'flex';
        }
    }
    window.onload = init;
</script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</body>
</html>
