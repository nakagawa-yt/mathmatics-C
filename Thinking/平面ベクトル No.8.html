<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ベクトル方程式：ケーキ屋への一本道</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ffe4e6 0%, #fef3c7 100%);
            --panel-bg: #fffdfa;
            --text-dark: #43141b;
            --primary-pink: #fb7185;
            --accent-mint: #0d9488;
            --cookie-brown: #b45309;
            --border-line: #fecdd3;
        }
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Yu Gothic', sans-serif;
            background: var(--bg-gradient);
            margin: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; color: var(--text-dark);
        }
        .app-container {
            background: var(--panel-bg); width: 95vw; max-width: 1150px; height: 85vh; max-height: 760px;
            padding: 25px; border-radius: 24px; box-shadow: 0 20px 30px -10px rgba(251, 113, 133, 0.2);
            display: flex; flex-direction: column; box-sizing: border-box;
            position: relative; border: 4px solid #fff;
        }
        .step-bar { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; }
        .step-node { width: 50px; height: 10px; background: #ffe4e6; border-radius: 5px; transition: 0.3s; }
        .step-node.active { background: var(--primary-pink); width: 80px; }
        .step-node.done { background: var(--accent-mint); }

        .chat-box {
            background: #fff5f5; border-left: 6px solid var(--primary-pink); border-radius: 4px 16px 16px 4px;
            padding: 12px 20px; margin-bottom: 15px; min-height: 60px;
            font-size: 1.1rem; line-height: 1.6; color: var(--text-dark);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
        }

        .main-content { display: flex; flex: 1; gap: 25px; min-height: 0; }
        
        #stage {
            flex: 1.3; position: relative; background: #fffcfc;
            border: 3px dashed var(--border-line); border-radius: 20px; overflow: hidden;
        }
        canvas { position: absolute; width: 100%; height: 100%; }

        .control-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; min-height: 0; justify-content: flex-start; }
        
        .input-container {
            display: flex; flex-direction: column; gap: 10px; background: #fff5f5;
            padding: 16px; border-radius: 16px; border: 2px solid var(--border-line);
        }
        .input-label { font-size: 1.1rem; font-weight: bold; color: var(--cookie-brown); }
        .text-answer-field {
            width: 100%; padding: 12px 16px; font-size: 1.4rem; border-radius: 12px;
            border: 2px solid var(--border-line); color: var(--text-dark); text-align: center;
            font-family: 'Courier New', Courier, monospace; font-weight: bold; box-sizing: border-box;
            background: #ffffff; transition: border-color 0.2s;
        }
        .text-answer-field:focus { outline: none; border-color: var(--primary-pink); background: #ffffff; }

        /* 【新機能】追加した演算子ボタンのスタイル */
        .math-keyboard {
            display: flex; gap: 8px; margin-top: 4px;
        }
        .math-key {
            flex: 1; background: white; border: 2px solid var(--border-line); padding: 8px;
            border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.25rem;
            transition: all 0.1s ease; color: var(--text-dark); text-align: center;
            box-shadow: 0 3px 0 var(--border-line); box-sizing: border-box;
        }
        .math-key:hover { border-color: var(--primary-pink); background: #fff1f2; }
        .math-key:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--border-line); }

        .choice-list { 
            display: flex; flex-direction: column; gap: 8px; 
            overflow-y: auto; min-height: 0; padding-right: 4px;
        }
        .choice-btn {
            background: white; border: 2px solid var(--border-line); padding: 10px 18px;
            border-radius: 14px; cursor: pointer; font-weight: bold; font-size: 1.15rem;
            transition: all 0.2s ease; color: var(--text-dark); text-align: left;
            display: flex; align-items: center; min-height: 48px; box-shadow: 0 3px 0 var(--border-line);
            box-sizing: border-box;
        }
        .choice-btn:hover { border-color: var(--primary-pink); background: #fff1f2; }
        .choice-btn.selected { border-color: var(--primary-pink); background: #ffe4e6; color: var(--primary-pink); box-shadow: 0 1px 0 var(--border-line); transform: translateY(2px); }

        .btn-submit {
            background: var(--primary-pink); color: white; padding: 12px; border: none;
            border-radius: 16px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            margin-top: auto; transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 0 #e11d48; flex-shrink: 0;
        }
        .btn-submit:hover { background: #f43f5e; }
        .btn-submit:active { transform: translateY(3px); box-shadow: 0 1px 0 #e11d48; }
        .btn-submit:disabled { background: #cbd5e1; color: #94a3b8; box-shadow: none; cursor: default; transform: none; }

        #feedback { font-size: 1.2rem; text-align: center; height: 1.3em; font-weight: bold; flex-shrink: 0; margin-top: 2px; }

        #clear-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--panel-bg); z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 20px; padding: 30px; box-sizing: border-box;
        }
        .form-container { width: 100%; flex: 1; background: white; border-radius: 16px; border: 2px solid var(--border-line); overflow: hidden; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="step-bar" id="step-bar">
        <div class="step-node active"></div><div class="step-node"></div><div class="step-node"></div><div class="step-node"></div><div class="step-node"></div>
    </div>

    <div class="chat-box" id="msg"></div>

    <div class="main-content">
        <div id="stage"><canvas id="canvas"></canvas></div>

        <div class="control-panel">
            <div id="input-area"></div>
            <div id="feedback"></div>
            <button class="btn-submit" id="submit-btn" onclick="onCheck()">決定して次へ</button>
        </div>
    </div>

    <div id="clear-screen">
        <h2 style="margin: 0 0 15px 0; color: var(--primary-pink); font-size: 1.8rem;">🍰 お買い物大成功！直線のベクトル方程式をマスターしました！ 🍰</h2>
        <div class="form-container">
            <iframe src="https://forms.gle/sF5X6uegc2A4Rf737" width="100%" height="100%" frameborder="0">読み込んでいます…</iframe>
        </div>
        <button class="btn-submit" style="width:260px; margin-top:20px;" onclick="location.reload()">もう一度挑戦する</button>
    </div>
</div>

<script>
    let quest = 1, selected = null, isProcessing = false;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const questData = {
        1: {
            type: "input",
            title: "ステップ 1: 目的地の方向をつかむ（方向ベクトル）",
            text: "家 $O$ から出発し、バス停 $A$ を通って、ケーキ屋 $B$ へと続くまっすぐな一本道を進みます。まずは、基準となる<br>「バス停からケーキ屋へ向かうベクトル $\\vec{AB}$」を、それぞれの位置ベクトル $\\vec{a}, \\vec{b}$ で表してみよう！",
            ans: ["b-a"]
        },
        2: {
            type: "choice",
            title: "ステップ 2: バス停からの移動量を表す",
            text: "バス停 $A$ を出発し、ケーキ屋への道を $t$ 倍だけ進んだ地点（現在地）を $P$ とします。このとき、<br>バス停 $A$ を始点とした現在地へのベクトル $\\vec{AP}$ はどのように表せるでしょうか？",
            choices: ["\\vec{AB} + t", "t\\vec{AB}", "\\frac{1}{t}\\vec{AB}", "t\\vec{a}"],
            ans: 1
        },
        3: {
            type: "choice",
            title: "ステップ 3: 家から現在地までのルートを繋ぐ",
            text: "家 $O$ から出発して、バス停 $A$ を経由して現在地 $P$ へ行くルートを考えます。<br>$\\vec{p} = \\vec{a} + \\vec{AP}$ にこれまでの結果を当てはめよう！",
            choices: ["\\vec{p} = \\vec{b} + t\\vec{AB}", "\\vec{p} = t\\vec{a} + \\vec{AB}", "\\vec{p} = \\vec{a} - t\\vec{AB}", "\\vec{p} = \\vec{a} + t\\vec{AB}"],
            ans: 3
        },
        4: {
            type: "choice",
            title: "ステップ 4: 位置ベクトルだけで美しく整理する",
            text: "ステップ3で求めた式の $\\vec{AB}$ に、ステップ1の $(\\vec{b} - \\vec{a})$ を代入して、$\\vec{a}$ と $\\vec{b}$ について整理しよう！",
            choices: ["\\vec{p} = (1-t)\\vec{a} + t\\vec{b}", "\\vec{p} = (t-1)\\vec{a} + t\\vec{b}", "\\vec{p} = t\\vec{a} + (1-t)\\vec{b}", "\\vec{p} = \\vec{a} + t\\vec{b}"],
            ans: 0
        },
        5: {
            type: "input",
            title: "最終ステップ: 直線のベクトル方程式の一般化",
            text: "まとめ！点 $A$を通り、ベクトル $\\vec{d}$ に平行な直線の方程式を完成させましょう。$\\vec{a}$ は点 $A$ の位置ベクトルです。<br>$\\vec{p} = \\cdots$ の右側を入力してね！",
            placeholder: "a + b",
            ans: ["a+td", "a+dt"]
        }
    };

    function init() {
        renderQuest();
    }

    function renderQuest() {
        isProcessing = false;
        selected = null;
        document.getElementById('submit-btn').disabled = false;
        
        const q = questData[quest];
        document.getElementById('msg').innerHTML = `<strong>${q.title}</strong><br>${q.text}`;
        renderMathInElement(document.getElementById('msg'), {delimiters:[{left:"$",right:"$",display:false}]});

        const area = document.getElementById('input-area');
        area.innerHTML = "";

        const stage = document.getElementById('stage');
        const container = document.querySelector('.app-container');
        
        stage.style.display = 'block';
        container.style.maxWidth = '1150px';
        const rect = stage.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;

        if (q.type === "input") {
            const inputContainer = document.createElement('div');
            inputContainer.className = "input-container";
            
            const label = document.createElement('div');
            label.className = "input-label";
            label.innerText = "解答を入力してね（下のボタンも使えます）：";
            
            const input = document.createElement('input');
            input.type = "text";
            input.id = "answer-input";
            input.className = "text-answer-field";
            input.placeholder = q.placeholder || "例: a+b";
            
            input.onkeydown = (e) => { if(e.key === 'Enter') onCheck(); };

            inputContainer.appendChild(label);
            inputContainer.appendChild(input);

            /* 【新機能】5問目のときだけ演算子ミニキーボードを生成して追加 */
            if (quest === 5) {
                const keyboard = document.createElement('div');
                keyboard.className = "math-keyboard";
                const keys = ['+', '-', '×', '÷'];
                keys.forEach(key => {
                    const btn = document.createElement('button');
                    btn.className = "math-key";
                    btn.type = "button";
                    btn.innerText = key;
                    btn.onclick = () => {
                        input.value += key;
                        input.focus();
                    };
                    keyboard.appendChild(btn);
                });
                inputContainer.appendChild(keyboard);
            }

            area.appendChild(inputContainer);
            setTimeout(() => input.focus(), 1000);
            
        } else {
            const list = document.createElement('div');
            list.className = "choice-list";
            q.choices.forEach((formula, i) => {
                const btn = document.createElement('button'); btn.className = "choice-btn";
                const mathSpan = document.createElement('span');
                btn.appendChild(mathSpan);
                list.appendChild(btn);
                
                katex.render(formula, mathSpan); 
                
                btn.onclick = () => { 
                    document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected')); 
                    btn.classList.add('selected'); 
                    selected = i; 
                };
            });
            area.appendChild(list);
        }

        draw();
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const W = canvas.width, H = canvas.height;

        if (quest === 5) {
            ctx.fillStyle = "#fffdf3";
            ctx.strokeStyle = varToString('--border-line');
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.roundRect(20, 20, W - 40, H - 40, 20);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = varToString('--cookie-brown');
            ctx.font = "bold 22px 'Hiragino Maru Gothic ProN', sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("📜 ここまでのステップのまとめ 📜", W / 2, H * 0.18);

            ctx.fillStyle = varToString('--text-dark');
            ctx.font = "bold 16px sans-serif";
            const lines = [
                "ステップ1： バス停への方向ベクトル AB は 「 b - a 」",
                "ステップ2： バス停からの移動量 AP は 「 t × (方向) 」",
                "ステップ3・4： 家 O からのルート p は 「 a + t (b - a) 」",
                "✨ 結論： 『通過点 a 』 ＋ t × 『方向ベクトル d 』 ✨"
            ];
            lines.forEach((line, idx) => {
                ctx.fillText(line, W / 2, H * 0.40 + idx * (H * 0.13));
            });
            
            ctx.textAlign = "left";
            return;
        }

        const O = { x: W * 0.52, y: H * 0.80 };
        const A = { x: W * 0.28, y: H * 0.50 };
        const B = { x: W * 0.76, y: H * 0.14 };
        
        const t = 0.45;
        const P = { x: A.x + (B.x - A.x) * t, y: A.y + (B.y - A.y) * t };

        ctx.strokeStyle = "#ffe4e6"; ctx.lineWidth = 14; ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(A.x - (B.x - A.x) * 0.2, A.y - (B.y - A.y) * 0.2);
        ctx.lineTo(B.x + (B.x - A.x) * 0.1, B.y + (B.y - A.y) * 0.1);
        ctx.stroke();

        ctx.strokeStyle = varToString('--cookie-brown'); ctx.lineWidth = 2; ctx.setLineDash([6, 6]);
        ctx.stroke(); ctx.setLineDash([]);

        ctx.fillStyle = "#cbd5e1"; ctx.beginPath(); ctx.arc(O.x, O.y, 7, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = varToString('--primary-pink'); ctx.beginPath(); ctx.arc(A.x, A.y, 7, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = varToString('--cookie-brown'); ctx.beginPath(); ctx.arc(B.x, B.y, 7, 0, Math.PI*2); ctx.fill();

        ctx.fillStyle = varToString('--text-dark'); ctx.font = "bold 16px sans-serif";
        ctx.fillText("家 O 🏠", O.x + 15, O.y + 5);
        ctx.fillText("バス停 A 🚌", A.x - 110, A.y + 5);
        ctx.fillText("ケーキ屋 B 🍰", B.x + 15, B.y + 5);

        if (quest === 1) {
            drawArrow(A.x, A.y, B.x - A.x, B.y - A.y, varToString('--accent-mint'), 4, "AB", "top_far");
        } 
        else if (quest === 2) {
            ctx.fillStyle = varToString('--primary-pink'); ctx.beginPath(); ctx.arc(P.x, P.y, 7, 0, Math.PI*2); ctx.fill();
            ctx.font = "bold 16px sans-serif"; ctx.fillText("📍 現在地 P", P.x - 45, P.y + 25);
            drawArrow(A.x, A.y, P.x - A.x, P.y - A.y, varToString('--accent-mint'), 4, "AP", "top_far");
        } 
        else if (quest === 3 || quest === 4) {
            ctx.fillStyle = varToString('--primary-pink'); ctx.beginPath(); ctx.arc(P.x, P.y, 7, 0, Math.PI*2); ctx.fill();
            ctx.font = "bold 16px sans-serif"; ctx.fillText("📍 現在地 P", P.x - 45, P.y + 25);
            
            drawArrow(O.x, O.y, A.x - O.x, A.y - O.y, varToString('--primary-pink'), 3, "a", "left");
            drawArrow(A.x, A.y, P.x - A.x, P.y - A.y, varToString('--accent-mint'), 3, "t AB", "top_far");
            drawArrow(O.x, O.y, P.x - O.x, P.y - O.y, varToString('--cookie-brown'), 5, "p", "bottom_far");
        }
    }

    function varToString(varName) {
        return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    }

    function drawArrow(x, y, dx, dy, color, width, label, labelPos) {
        ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = width;
        ctx.moveTo(x, y); ctx.lineTo(x + dx, y + dy); ctx.stroke();
        
        const a = Math.atan2(dy, dx); 
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.moveTo(x+dx, y+dy);
        ctx.lineTo(x+dx-14*Math.cos(a-0.4), y+dy-14*Math.sin(a-0.4));
        ctx.lineTo(x+dx-14*Math.cos(a+0.4), y+dy-14*Math.sin(a+0.4)); ctx.fill();
        
        if(label) { 
            ctx.fillStyle = color;
            ctx.font = "italic bold 18px sans-serif";
            
            const midX = x + dx * 0.5;
            const midY = y + dy * 0.5;
            
            const nx = -Math.sin(a);
            const ny = Math.cos(a);
            
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            if (labelPos === "top_far") {
                ctx.fillText(label, midX + nx * 30, midY + ny * 30);
            } else if (labelPos === "bottom_far") {
                ctx.fillText(label, midX - nx * 28, midY - ny * 28);
            } else if (labelPos === "left") {
                ctx.fillText(label, midX + nx * 22, midY + ny * 22);
            } else {
                ctx.fillText(label, midX + nx * 18, midY + ny * 18);
            }
            ctx.textAlign = "left";
            ctx.textBaseline = "alphabetic";
        }
    }

    function onCheck() {
        if (isProcessing) return;
        const q = questData[quest];
        let correct = false;

        if (q.type === "input") {
            const userInput = document.getElementById('answer-input').value;
            /* 【パワーアップ】スペース、全角＋－、および掛け算記号(×や*)を綺麗に処理して判定 */
            const normalizedInput = userInput
                .replace(/\s+/g, '')
                .replace(/[＋]/g, '+')
                .replace(/[－−]/g, '-')
                .replace(/×|\*/g, '') // かけ算記号が入力されても自動で「省略」扱いにして正解にする
                .toLowerCase();
            
            correct = q.ans.some(a => a === normalizedInput);
            if (!userInput.trim()) { alert("解答を入力してください！"); return; }
        } else {
            if (selected === null) { alert("選択肢をどれか1つ選んでください！"); return; }
            correct = (selected === q.ans);
        }

        const fb = document.getElementById('feedback');
        if (correct) {
            isProcessing = true;
            document.getElementById('submit-btn').disabled = true;
            fb.innerHTML = "🍓 正解です！美味しさアップ！"; fb.style.color = varToString('--accent-mint');
            setTimeout(() => {
                fb.innerHTML = "";
                nextQuest();
            }, 1200);
        } else {
            fb.innerHTML = "もう一度数式を見直してみましょう。"; fb.style.color = varToString('--primary-pink');
        }
    }

    function nextQuest() {
        if (quest < 5) {
            document.querySelectorAll('.step-node')[quest-1].className = "step-node done";
            quest++;
            document.querySelectorAll('.step-node')[quest-1].className = "step-node active";
            renderQuest();
        } else {
            document.getElementById('clear-screen').style.display = 'flex';
        }
    }
    window.onload = init;
</script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</body>
</html>
