<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ベクトルぱずる II</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <style>
        :root {
            --bg-top: #2c3e50;
            --bg-bottom: #2980b9;
            --card-bg: rgba(255, 255, 255, 0.98);
            --accent-blue: #3498db;
            --accent-red: #e74c3c;
            --accent-green: #2ecc71;
            --text-color: #2d3436;
            --grid-line: #dfe6e9;
        }

        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Meiryo', sans-serif;
            background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .container {
            background: var(--card-bg);
            width: 95%;
            max-width: 900px;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
        }

        .instruction-card {
            background: #f0f7ff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #d1e5f0;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-size: 1.15rem;
            line-height: 1.8;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 2px;
            background-color: var(--grid-line);
            border: 3px solid #636e72;
            width: fit-content;
            margin: 0 auto;
            padding: 10px;
            position: relative;
        }

        .cell {
            background: white;
            width: 80px;
            height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .cell:hover { background: #f1f2f6; }
        .cell.selected { background: #ffeaa7; border: 3px solid #f1c40f; box-sizing: border-box; }

        .animal-icon { font-size: 32px; pointer-events: none; }
        .animal-name { font-size: 10px; color: #b2bec3; margin-top: 4px; pointer-events: none; }

        .answer-display {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-blue);
            margin: 15px 0;
            height: 30px;
        }

        .main-btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #2980b9;
            transition: 0.1s;
        }
        .main-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2980b9; }

        .feedback { min-height: 40px; margin-top: 15px; font-weight: bold; font-size: 1.3rem; }

        #result-view { display: none; }
        .form-container {
            width: 100%;
            height: 500px;
            border: 2px solid #ddd;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 20px;
        }

        .v1 { color: var(--accent-blue); font-weight: bold; }
        .v2 { color: var(--accent-red); font-weight: bold; }
        .v3 { color: var(--accent-green); font-weight: bold; }

        /* 数式のインライン表示を強制 */
        .math-inline {
            display: inline-block;
            vertical-align: middle;
        }
        /* 「1/2倍」のセットを改行させない */
        .nowrap {
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="game-view">
        <div style="color: var(--accent-blue); font-weight: bold; margin-bottom: 10px;">
            Vector Challenge <span id="q-num">1</span> / 8
        </div>
        
        <div class="instruction-card" id="q-text"></div>

        <div class="grid-container" id="grid"></div>

        <div class="controls">
            <div class="answer-display">答え：<span id="selected-name">マスをクリックしてね</span></div>
            <button class="main-btn" id="action-btn" onclick="handleAction()">決定する</button>
        </div>

        <div id="feedback" class="feedback"></div>
    </div>

    <div id="result-view">
        <div style="font-size: 4rem; margin-bottom: 10px;">🎓</div>
        <h2>全8問、完全クリア！</h2>
        <p>ベクトルについて理解してきた？</p>
        <div class="form-container">
            <iframe src="https://forms.gle/aidYPfAjFbSEpsLy9" frameborder="0" width="100%" height="100%">読み込んでいます…</iframe>
        </div>
        <button class="main-btn" style="margin-top: 25px;" onclick="location.reload()">もう一度あそぶ</button>
    </div>
</div>

<script>
    const animalData = [
        { icon: "🐶", name: "イヌ" }, { icon: "🐱", name: "ネコ" }, { icon: "🐭", name: "ネズミ" }, { icon: "🐹", name: "ハムスター" }, { icon: "🐰", name: "ウサギ" }, { icon: "🦊", name: "キツネ" },
        { icon: "🐻", name: "クマ" }, { icon: "🐼", name: "パンダ" }, { icon: "🐨", name: "コアラ" }, { icon: "🐯", name: "トラ" }, { icon: "🦁", name: "ライオン" }, { icon: "🐮", name: "ウシ" },
        { icon: "🐷", name: "ブタ" }, { icon: "🐸", name: "カエル" }, { icon: "🐵", name: "サル" }, { icon: "🐔", name: "ニワトリ" }, { icon: "🐧", name: "ペンギン" }, { icon: "🐦", name: "トリ" },
        { icon: "🐤", name: "ひよこ" }, { icon: "🦉", name: "フクロウ" }, { icon: "🐴", name: "ウマ" }, { icon: "🐝", name: "ハチ" }, { icon: "🐙", name: "タコ" }, { icon: "🐢", name: "カメ" },
        { icon: "🦖", name: "ダイナソー" }, { icon: "🐋", name: "クジラ" }, { icon: "🐘", name: "ゾウ" }, { icon: "🦒", name: "キリン" }, { icon: "🐆", name: "ヒョウ" }, { icon: "🦓", name: "シマウマ" }
    ];

    const animals = [];
    const cellWidth = 80;
    const gap = 2;
    const gridCols = 6;
    const gridRows = 5;
    const canvasWidth = (gridCols * cellWidth) + ((gridCols - 1) * gap);
    const canvasHeight = (gridRows * cellWidth) + ((gridRows - 1) * gap);

    const questions = [
        { text: "ベクトル <span class='v1'>ダイナソー→クジラ</span> の「逆ベクトル」を考えます。<br><b>カエル</b> を始点にすると、終点はどこ？", ans: "ブタ", vectors: [{start:"ダイナソー", end:"クジラ"}] },
        { text: "ベクトル <span class='v1'>サル→ニワトリ</span> から <span class='v2'>サル→コアラ</span> を引きます。<br><b>ライオン</b> を始点にすると、終点はどこ？", ans: "トリ", vectors: [{start:"サル", end:"ニワトリ"}, {start:"サル", end:"コアラ"}] },
        { text: "ベクトル <span class='v1'>パンダ→キツネ</span> から <span class='v2'>フクロウ→ダイナソー</span> を引きます。<br><b>ダイナソー</b> を始点にすると、終点はどこ？", ans: "トリ", vectors: [{start:"パンダ", end:"キツネ"}, {start:"フクロウ", end:"ダイナソー"}] },
        { text: "ベクトル <span class='v1'>ペンギン→トラ</span> から <span class='v2'>ニワトリ→パンダ</span> を引きます。<br><b>ヒョウ</b> を始点にすると、終点はどこ？", ans: "シマウマ", vectors: [{start:"ペンギン", end:"トラ"}, {start:"ニワトリ", end:"パンダ"}] },
        { text: "ベクトル <span class='v1'>イヌ→ネコ</span> から <span class='v2'>ニワトリ→ウサギ</span> と <span class='v3'>トラ→ゾウ</span> をどちらも引きます。<br><b>ニワトリ</b> を始点にすると、終点はどこ？", ans: "ライオン", vectors: [{start:"イヌ", end:"ネコ"}, {start:"ニワトリ", end:"ウサギ"}, {start:"トラ", end:"ゾウ"}] },
        { text: "ベクトル <span class='v1'>ダイナソー→クジラ</span> を「3倍」にしたベクトルを考えます。<br><b>ブタ</b> を始点にすると、終点はどこ？", ans: "ニワトリ", vectors: [{start:"ダイナソー", end:"クジラ"}] },
        { text: "ベクトル <span class='v1'>ペンギン→サル</span> を<span class='nowrap'><span id='math-fraction' class='math-inline'></span>倍にしたベクトルを考えます。</span><b>キツネ</b> を始点にすると、終点はどこ？", ans: "ウサギ", vectors: [{start:"ペンギン", end:"サル"}] },
        { text: "ラスト計算！ <span class='v1'>イヌ→ネコ</span> を2倍したものに、<span class='v2'>ネコ→クマ</span> を3倍したものを足します。<br>始点を <b>コアラ</b> にすると、終点はどこ？", ans: "クジラ", vectors: [{start:"イヌ", end:"ネコ"}, {start:"ネコ", end:"クマ"}] }
    ];

    let currentIdx = 0;
    let selectedName = "";
    let isCorrected = false;

    function initGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        const canvas = document.createElement('canvas');
        canvas.id = 'vector-overlay';
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
        canvas.style.cssText = 'position: absolute; top: 10px; left: 10px; pointer-events: none; z-index: 100;';
        grid.appendChild(canvas);

        let idx = 0;
        for (let y = gridRows - 1; y >= 0; y--) {
            for (let x = 0; x < gridCols; x++) {
                const a = animalData[idx];
                const pixelX = (x * (cellWidth + gap)) + (cellWidth / 2);
                const pixelY = (((gridRows - 1) - y) * (cellWidth + gap)) + (cellWidth / 2);
                animals.push({ ...a, x: x, y: y, pixelX: pixelX, pixelY: pixelY });
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerHTML = `<span class="animal-icon">${a.icon}</span><span class="animal-name">${a.name}</span>`;
                cell.onclick = (e) => selectAnimal(a.name, e.currentTarget);
                grid.appendChild(cell);
                idx++;
            }
        }
    }

    function drawArrow(ctx, fromx, fromy, tox, toy, headLength, color) {
        const angle = Math.atan2(toy - fromy, tox - fromx);
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.moveTo(fromx, fromy); ctx.lineTo(tox, toy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(tox, toy);
        ctx.lineTo(tox - headLength * Math.cos(angle - Math.PI / 6), toy - headLength * Math.sin(angle - Math.PI / 6));
        ctx.lineTo(tox - headLength * Math.cos(angle + Math.PI / 6), toy - headLength * Math.sin(angle + Math.PI / 6));
        ctx.closePath(); ctx.fill();
    }

    function drawVectors() {
        const canvas = document.getElementById('vector-overlay');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const q = questions[currentIdx];
        if (!q.vectors) return;
        ctx.lineWidth = 3;
        const headLength = 12;
        const colors = ["#3498db", "#e74c3c", "#2ecc71"];
        q.vectors.forEach((v, i) => {
            const startA = animals.find(a => a.name === v.start);
            const endA = animals.find(a => a.name === v.end);
            if (startA && endA) drawArrow(ctx, startA.pixelX, startA.pixelY, endA.pixelX, endA.pixelY, headLength, colors[i % 3]);
        });
    }

    function selectAnimal(name, element) {
        if (isCorrected) return;
        selectedName = name;
        document.getElementById('selected-name').innerText = name;
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
        element.classList.add('selected');
    }

    function loadQuestion() {
        isCorrected = false;
        selectedName = "";
        const q = questions[currentIdx];
        document.getElementById('q-num').innerText = currentIdx + 1;
        document.getElementById('q-text').innerHTML = q.text;
        
        if (currentIdx === 6) {
            setTimeout(() => {
                const el = document.getElementById('math-fraction');
                // displayMode: false オプションを付けてインライン描画を徹底
                if(el) katex.render("\\frac{1}{2}", el, { displayMode: false });
            }, 10);
        }

        document.getElementById('feedback').innerText = "";
        document.getElementById('selected-name').innerText = "マスをクリックしてね";
        document.getElementById('action-btn').innerText = "決定する";
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
        drawVectors();
    }

    function handleAction() {
        if (isCorrected) {
            currentIdx++;
            if (currentIdx < questions.length) loadQuestion();
            else showResult();
        } else {
            const q = questions[currentIdx];
            const fb = document.getElementById('feedback');
            if (!selectedName) return;
            if (selectedName === q.ans) {
                fb.innerText = "正解です！素晴らしい！ ✨";
                fb.style.color = "#27ae60";
                document.getElementById('action-btn').innerText = "次の問題へ";
                isCorrected = true;
            } else {
                fb.innerText = "そこじゃないみたい。計算を見直してみて！";
                fb.style.color = "#e67e22";
            }
        }
    }

    function showResult() {
        document.getElementById('game-view').style.display = "none";
        document.getElementById('result-view').style.display = "block";
    }

    initGrid();
    loadQuestion();
</script>

</body>
</html>
