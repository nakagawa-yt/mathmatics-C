<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ベクトルぱずる Ⅳ</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <style>
        :root {
            --bg-top: #0f172a;
            --bg-bottom: #1e3a8a;
            --card-bg: rgba(255, 255, 255, 0.98);
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
        }

        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Meiryo', sans-serif;
            background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .container {
            background: var(--card-bg);
            width: 95%;
            max-width: 800px;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .instruction-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 1.5rem;
        }

        .vec-header-unit { display: inline-flex; flex-direction: column; align-items: center; }
        .vec-arrow-line { font-size: 1rem; line-height: 1; margin-bottom: -3px; font-weight: bold; }
        .vec-icons-main { font-size: 2.5rem; line-height: 1; letter-spacing: 2px; }

        #canvas-area {
            position: relative;
            margin: 10px auto;
            width: 400px;
            height: 360px;
            background: #fff;
            border-radius: 15px;
        }

        #vector-canvas { position: absolute; top: 0; left: 0; z-index: 5; }

        .animal-label {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        .animal-icon { font-size: 38px; }

        .input-section {
            margin: 30px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .math-display-area {
            font-size: 2.5rem;
            min-height: 60px;
            color: var(--accent-blue);
        }

        #main-input {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            font-size: 1.8rem;
            text-align: center;
            border: 3px solid #e2e8f0;
            border-radius: 20px;
            outline: none;
            background: #f8fafc;
            transition: all 0.2s;
            font-family: inherit;
        }

        #main-input:focus {
            border-color: var(--accent-blue);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .input-hint {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: -5px;
        }

        .main-btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 18px 100px;
            border-radius: 9999px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #2563eb;
            transition: transform 0.1s;
        }
        .main-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #2563eb; }

        .feedback { min-height: 40px; margin-top: 20px; font-weight: bold; font-size: 1.4rem; }

        #clear-view { display: none; }
        .clear-title { font-size: 3rem; color: var(--accent-green); font-weight: 900; margin-bottom: 20px; }
        .form-container {
            width: 100%; height: 600px; border: 2px solid #e2e8f0;
            border-radius: 20px; overflow: hidden; background: white; margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="game-view">
        <div style="color: #64748b; font-weight: bold; margin-bottom: 15px; font-size: 0.9rem; letter-spacing: 3px;">Vector Puzzle <span id="q-num">1</span>/6</div>
        
        <div class="instruction-card">
            <div class="vec-header-unit">
                <div class="vec-arrow-line">──────▶</div>
                <div class="vec-icons-main" id="target-icons"></div>
            </div>
            <span id="q-text"></span>
        </div>

        <div id="canvas-area">
            <canvas id="vector-canvas" width="400" height="360"></canvas>
            <div id="labels-layer"></div>
        </div>

        <div class="input-section">
            <div id="math-preview" class="math-display-area"></div>
            <input type="text" id="main-input" placeholder="a" autocomplete="off" autofocus>
            <div class="input-hint">クリックや矢印キーで途中の文字を直せます</div>
        </div>

        <button class="main-btn" id="action-btn" onclick="handleAction()">決定する</button>
        <div id="feedback" class="feedback"></div>
    </div>

    <div id="clear-view">
        <div class="clear-title">Excellent! 🏆</div>
        <p style="font-size: 1.3rem;">完全クリア！</p>
        <div class="form-container">
            <iframe src="https://forms.gle/Bo59pPcGWeAf33QP8" width="100%" height="100%" frameborder="0">読み込んでいます…</iframe>
        </div>
    </div>
</div>

<script>
    const icons = { "イヌ":"🐶", "ネコ":"🐱", "ウサギ":"🐰", "クマ":"🐻", "クジラ":"🐳", "ゾウ":"🐘", "キリン":"🦒", "パンダ":"🐼", "サル":"🐵", "ペンギン":"🐧", "ライオン":"🦁" };
    const hexCenter = [200, 180];
    const hexPts = { "ゾウ":[300,180],"キリン":[250,93],"パンダ":[150,93],"サル":[100,180],"ペンギン":[150,267],"ライオン":[250,267] };

    const questions = [
        { type: "para", target: icons["イヌ"]+icons["クマ"], ans: { a: 1, b: 1 }, points: { "イヌ": [100, 260], "ネコ": [300, 260], "ウサギ": [150, 110], "クマ": [350, 110] }, baseVecs: [ ["イヌ","ネコ","#3b82f6","a"], ["イヌ","ウサギ","#ef4444","b"] ], targetVec: ["イヌ","クマ","#10b981", ""] },
        { type: "para", target: icons["ウサギ"]+icons["ネコ"], ans: { a: 1, b: -1 }, points: { "イヌ": [100, 260], "ネコ": [300, 260], "ウサギ": [150, 110], "クマ": [350, 110] }, baseVecs: [ ["イヌ","ネコ","#3b82f6","a"], ["イヌ","ウサギ","#ef4444","b"] ], targetVec: ["ウサギ","ネコ","#10b981", ""] },
        { type: "hex", target: icons["クジラ"]+icons["ライオン"], ans: { a: 1, b: -1 }, points: { "クジラ": hexCenter, ...hexPts }, baseVecs: [ ["クジラ","ゾウ","#3b82f6","a"], ["クジラ","キリン","#ef4444","b"] ], targetVec: ["クジラ","ライオン","#10b981", ""] },
        { type: "hex", target: icons["クジラ"]+icons["パンダ"], ans: { a: -1, b: 1 }, points: { "クジラ": hexCenter, ...hexPts }, baseVecs: [ ["クジラ","ゾウ","#3b82f6","a"], ["クジラ","キリン","#ef4444","b"] ], targetVec: ["クジラ","パンダ","#10b981", ""] },
        { type: "hex", target: icons["ペンギン"]+icons["ゾウ"], ans: { a: 1, b: 1 }, points: { "クジラ": hexCenter, ...hexPts }, baseVecs: [ ["クジラ","ゾウ","#3b82f6","a"], ["クジラ","キリン","#ef4444","b"] ], targetVec: ["ペンギン","ゾウ","#10b981", ""] },
        { type: "hex", target: icons["ライオン"]+icons["パンダ"], ans: { a: -2, b: 2 }, points: { "クジラ": hexCenter, ...hexPts }, baseVecs: [ ["クジラ","ゾウ","#3b82f6","a"], ["クジラ","キリン","#ef4444","b"] ], targetVec: ["ライオン","パンダ","#10b981", ""] }
    ];

    let currentIdx = 0, isCorrected = false;
    const inputEl = document.getElementById('main-input');
    const previewEl = document.getElementById('math-preview');

    function updatePreview() {
        let val = inputEl.value.replace(/[Ａ-Ｚａ-ｚ０-９＋－]/g, s => String.fromCharCode(s.charCodeAt(0)-0xFEE0)).replace(/[^ab0-9\+\-]/gi, '').toLowerCase();
        let latex = val.replace(/a/g, '\\vec{a}').replace(/b/g, '\\vec{b}');
        if (val === "") previewEl.innerHTML = "";
        else katex.render(latex, previewEl, { throwOnError: false });
    }

    inputEl.addEventListener('input', updatePreview);
    inputEl.addEventListener('keydown', (e) => { if(e.key === 'Enter') handleAction(); });

    function drawArrow(ctx, fx, fy, tx, ty, color, label = "") {
        const angle = Math.atan2(ty - fy, tx - fx), offset = 25;
        const sx = fx + offset * Math.cos(angle), sy = fy + offset * Math.sin(angle);
        const ex = tx - offset * Math.cos(angle), ey = ty - offset * Math.sin(angle);
        
        ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 4; ctx.lineCap = "round";
        ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
        
        const hl = 15; ctx.beginPath(); ctx.moveTo(ex, ey);
        ctx.lineTo(ex - hl * Math.cos(angle - Math.PI/6), ey - hl * Math.sin(angle - Math.PI/6));
        ctx.lineTo(ex - hl * Math.cos(angle + Math.PI/6), ey - hl * Math.sin(angle + Math.PI/6));
        ctx.fill();

        // ベクトルの名前（a, b）を表示する
        if (label) {
            ctx.font = "bold 24px 'Times New Roman', serif";
            const midX = (sx + ex) / 2 + 15 * Math.cos(angle + Math.PI/2);
            const midY = (sy + ey) / 2 + 15 * Math.sin(angle + Math.PI/2);
            ctx.fillText(label === 'a' ? 'a' : 'b', midX, midY);
            // ベクトルの矢印記号（簡易版）
            ctx.font = "14px serif";
            ctx.fillText("→", midX, midY - 18);
        }
    }

    function loadQuestion() {
        isCorrected = false; inputEl.value = ""; updatePreview();
        const q = questions[currentIdx];
        document.getElementById('q-num').innerText = currentIdx + 1;
        document.getElementById('target-icons').innerText = q.target;
        document.getElementById('feedback').innerText = "";
        document.getElementById('action-btn').innerText = "決定する";

        const canvas = document.getElementById('vector-canvas'), ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#cbd5e1"; ctx.lineWidth = 2;

        const pts = q.points;
        if (q.type === "para") {
            ctx.beginPath(); ctx.moveTo(...pts["イヌ"]); ctx.lineTo(...pts["ネコ"]); ctx.lineTo(...pts["クマ"]); ctx.lineTo(...pts["ウサギ"]); ctx.closePath(); ctx.stroke();
        } else {
            const order = ["ゾウ", "キリン", "パンダ", "サル", "ペンギン", "ライオン"];
            ctx.beginPath(); ctx.moveTo(...pts[order[0]]); order.forEach(n => ctx.lineTo(...pts[n])); ctx.closePath(); ctx.stroke();
            order.forEach(n => { ctx.beginPath(); ctx.moveTo(...pts["クジラ"]); ctx.lineTo(...pts[n]); ctx.stroke(); });
        }
        
        // 基本ベクトル a, b を描画（ラベル付き）
        q.baseVecs.forEach(v => drawArrow(ctx, ...pts[v[0]], ...pts[v[1]], v[2], v[3]));
        // ターゲットベクトルを描画
        drawArrow(ctx, ...pts[q.targetVec[0]], ...pts[q.targetVec[1]], q.targetVec[2]);

        const layer = document.getElementById('labels-layer'); layer.innerHTML = "";
        for (let name in pts) {
            const div = document.createElement('div'); div.className = 'animal-label';
            div.style.left = pts[name][0] + 'px'; div.style.top = pts[name][1] + 'px';
            div.innerHTML = `<span class="animal-icon">${icons[name]}</span>`; layer.appendChild(div);
        }
        katex.render("\\text{を } \\vec{a}, \\vec{b} \\text{ で表そう}", document.getElementById('q-text'));
        inputEl.focus();
    }

    function parseInput(str) {
        const cleanStr = str.replace(/[Ａ-Ｚａ-ｚ０-９＋－]/g, s => String.fromCharCode(s.charCodeAt(0)-0xFEE0)).replace(/\s+/g, '').toLowerCase();
        const regex = /([+-]?\d*)([ab])/g;
        let match, coeffs = { a: 0, b: 0 };
        while ((match = regex.exec(cleanStr)) !== null) {
            let num = match[1], char = match[2];
            let val = (num === "" || num === "+") ? 1 : (num === "-") ? -1 : parseInt(num);
            coeffs[char] += val;
        }
        return coeffs;
    }

    function handleAction() {
        if (isCorrected) {
            currentIdx++;
            if (currentIdx < questions.length) loadQuestion();
            else {
                document.getElementById('game-view').style.display = 'none';
                document.getElementById('clear-view').style.display = 'block';
                window.scrollTo(0,0);
            }
            return;
        }
        const user = parseInput(inputEl.value);
        const correct = questions[currentIdx].ans;
        if (user.a === correct.a && user.b === correct.b) {
            document.getElementById('feedback').innerText = "正解です！素晴らしい！ ✨";
            document.getElementById('feedback').style.color = "#10b981";
            document.getElementById('action-btn').innerText = (currentIdx === 5) ? "クリア画面へ" : "次の問題へ";
            isCorrected = true;
        } else {
            document.getElementById('feedback').innerText = "残念！向きと長さをもう一度チェック。";
            document.getElementById('feedback').style.color = "#ef4444";
        }
    }

    window.onload = loadQuestion;
</script>
</body>
</html>
